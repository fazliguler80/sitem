<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokrat.com | Site Yönetim Sistemi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-admin {
            background: #1e3c72;
            color: white;
        }
        .btn-portal {
            background: #28a745;
            color: white;
        }
        .info {
            margin-top: 30px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 Nokrat.com</h1>
        <h2>Site Yönetim Sistemi</h2>
        <p>
            Hoş geldiniz! Bu site, site yönetim işlemlerinizi kolaylaştırmak için geliştirilmiştir.
            Aidat ödemeleri, gider takibi, duyurular ve daha fazlası için lütfen giriş yapınız.
        </p>
        <div class="buttons">
            <a href="/admin/" class="btn btn-admin">👨‍💼 Admin Girişi</a>
            <a href="/portal/" class="btn btn-portal">🏠 Daire Sakini Girişi</a>
        </div>
        <div class="info">
            <p>© 2026 Nokrat.com - Tüm hakları saklıdır.</p>
        </div>
    </div>
</body>
</html>
