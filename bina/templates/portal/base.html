<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Daire Portalı</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 0; background: #f5f5f5; }
        .header { background: #1e3c72; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #2a5298; padding: 10px; }
        .nav a { color: white; text-decoration: none; margin: 0 15px; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #e9ecef; }
        .btn { background: #28a745; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; display: inline-block; }
        .logout-btn { background: none; border: none; color: white; cursor: pointer; font-size: 14px; }
        .logout-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🏠 Daire Portalı</h2>
        <div>
            {{ request.user.get_full_name }} | 
            <form action="{% url 'portal_logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">🚪 Çıkış</button>
            </form>
        </div>
    </div>
    <div class="nav">
        <a href="{% url 'portal_ana' %}">Ana Sayfa</a>
        <a href="{% url 'aidat_gecmisi' %}">Aidat Geçmişi</a>
        <a href="{% url 'borc_durumu' %}">Borcum</a>
        <a href="{% url 'komsular' %}">Komşular</a>
        <a href="{% url 'profil_duzenle' %}">👤 Profilim</a>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
