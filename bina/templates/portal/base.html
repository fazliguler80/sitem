<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Daire Portalı</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 0; background: #f5f5f5; }
        .header { background: #1e3c72; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #2a5298; padding: 10px; }
        .nav a { color: white; text-decoration: none; margin: 0 15px; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #e9ecef; }
        .btn { background: #28a745; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; display: inline-block; }
        .logout-btn { background: none; border: none; color: white; cursor: pointer; font-size: 14px; }
        .logout-btn:hover { text-decoration: underline; }
        
        /* Depozito kartı için yeni stiller */
        .card-container {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin: 0 0 10px 0;
        }
        .card .amount {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        .card-link {
            display: inline-block;
            margin-top: 10px;
            color: #1e3c72;
            text-decoration: none;
        }
        .card-link:hover {
            text-decoration: underline;
        }
        .bg-success-light { background: #d4edda; }
        .bg-info-light { background: #cce5ff; }
        .bg-warning-light { background: #fff3cd; }
        
        /* Yuvarlama badge'i */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-warning {
            background: #ffc107;
            color: #212529;
        }
        .badge-success {
            background: #28a745;
            color: white;
        }
        .badge-danger {
            background: #dc3545;
            color: white;
        }
        
        /* Tablo renkleri */
        .table-success { background-color: #d4edda; }
        .table-danger { background-color: #f8d7da; }
        .table-warning { background-color: #fff3cd; }
        
        /* Responsive tablo */
        .table-responsive {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🏠 Daire Portalı</h2>
        <div>
            {{ request.user.get_full_name }} | 
            <form action="{% url 'portal_logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">🚪 Çıkış</button>
            </form>
        </div>
    </div>
    <div class="nav">
        <a href="{% url 'portal_ana' %}">Ana Sayfa</a>
        <a href="{% url 'aidat_gecmisi' %}">Aidat Geçmişi</a>
        <a href="{% url 'borc_durumu' %}">Borcum</a>
        <a href="{% url 'depozito_gecmisi' %}">💰 Depozito</a>  <!-- YENİ EKLENDİ -->
        <a href="{% url 'komsular' %}">Komşular</a>
        <a href="{% url 'profil_duzenle' %}">👤 Profilim</a>
    </div>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}" style="padding: 10px; margin-bottom: 15px; border-radius: 5px; background: {% if message.tags == 'error' %}#f8d7da{% else %}#d4edda{% endif %};">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
