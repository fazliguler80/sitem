{% extends "portal/base.html" %}
{% block content %}
<h2>👤 Profil Düzenle</h2>

<form method="post" style="max-width: 500px;">
    {% csrf_token %}
    
    <div style="margin-bottom: 15px;">
        <label>Ad Soyad:</label>
        <input type="text" value="{{ request.user.get_full_name }}" disabled style="width:100%; padding:8px; background:#f5f5f5;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label>Daire:</label>
        <input type="text" value="{{ daire_kullanici.daire }}" disabled style="width:100%; padding:8px; background:#f5f5f5;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label>Telefon:</label>
        <input type="tel" name="telefon" value="{{ daire_kullanici.telefon }}" style="width:100%; padding:8px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label>E-posta:</label>
        <input type="email" name="email" value="{{ daire_kullanici.email }}" style="width:100%; padding:8px;">
    </div>
    
    <hr>
    <h3>🔐 Şifre Değiştir</h3>
    
    <div style="margin-bottom: 15px;">
        <label>Mevcut Şifre:</label>
        <input type="password" name="old_password" style="width:100%; padding:8px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label>Yeni Şifre:</label>
        <input type="password" name="new_password1" style="width:100%; padding:8px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label>Yeni Şifre (Tekrar):</label>
        <input type="password" name="new_password2" style="width:100%; padding:8px;">
    </div>
    
    <button type="submit" style="background: #28a745; color:white; border:none; padding:10px 20px; border-radius:5px;">💾 Kaydet</button>
</form>
{% endblock %}
